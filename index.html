<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor 2D</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/left-sidebar.css" />
    <link rel="stylesheet" href="./css/right-sidebar.css" />
    <link rel="stylesheet" href="./css/drawer.css" />
    <link rel="stylesheet" href="./css/toolbar.css" />
    <link rel="stylesheet" href="./css/tooltips.css" />
  </head>
  <body>
    <main class="editor-page left-panel-collapsed" aria-label="Editor 2D">
      <div class="panel-toggle-bg" aria-hidden="true"></div>

      <aside class="side-panel left-rail" aria-label="Quick panel" data-tooltip-zone>
        <button class="panel-title" type="button" data-tooltip="CBOs">CBOs</button>
        <button class="panel-toggle" type="button" aria-label="Open left panel" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="18" height="18" x="3" y="3" rx="2" />
            <path d="M15 3v18" />
            <path d="m8 9 3 3-3 3" />
          </svg>
        </button>
        <div class="rail-tools">
          <button class="rail-button" type="button" aria-label="Template" data-tooltip="TEMPLATE" data-drawer-panel="template" data-rail-button>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect width="18" height="7" x="3" y="3" rx="1" />
              <rect width="9" height="7" x="3" y="14" rx="1" />
              <rect width="5" height="7" x="16" y="14" rx="1" />
            </svg>
          </button>
          <button class="rail-button" type="button" aria-label="Elements" data-tooltip="ELEMENTS" data-drawer-panel="elements" data-rail-button>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="M12 9v6" />
              <path d="M16 15v6" />
              <path d="M16 3v6" />
              <path d="M3 15h18" />
              <path d="M3 9h18" />
              <path d="M8 15v6" />
              <path d="M8 3v6" />
            </svg>
          </button>
          <button class="rail-button" type="button" aria-label="Mockups" data-tooltip="MOCKUPS" data-drawer-panel="mockups" data-rail-button>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z" />
            </svg>
          </button>
        </div>
      </aside>

      <aside class="side-panel left-drawer" aria-label="Left drawer">
        <div class="drawer-title">CLOTHING BRAND OWNER</div>
        <div class="drawer-search" role="search" aria-label="Search elements">
          <input type="search" placeholder="Search" />
          <button class="drawer-search-clear" type="button" aria-label="Clear search">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div class="drawer-content"></div>
      </aside>

      <section class="editor-stage" aria-label="Editor stage"></section>

      <aside class="side-panel right-panel" aria-label="Properties panel"></aside>

      <div class="toolbar-dock" aria-label="Editor controls" data-tooltip-zone>
        <nav class="bottom-toolbar" aria-label="Toolbar editor">
          <div class="tool-group" aria-label="Selection tools">
            <button class="tool-button active" type="button" aria-label="MOVE" aria-pressed="true" data-tooltip="MOVE" data-toolset-primary="selection" data-tool>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" />
              </svg>
            </button>
            <button class="tool-button tool-menu-button" type="button" aria-label="Selection tools" aria-pressed="false" data-tooltip="Selection tools">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
              <span class="tool-popover" aria-hidden="true">
                <span class="popover-option active" data-toolset-option="selection" data-shortcut="v" data-label="MOVE">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" />
                  </svg>
                  <span class="popover-label">MOVE</span>
                  <span class="popover-key">V</span>
                </span>
                <span class="popover-option" data-toolset-option="selection" data-shortcut="h" data-label="HANDTOOL">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2" />
                    <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2" />
                    <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8" />
                    <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />
                  </svg>
                  <span class="popover-label">HANDTOOL</span>
                  <span class="popover-key">H</span>
                </span>
                <span class="popover-option" data-toolset-option="selection" data-shortcut="z" data-label="ZOOM">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2" />
                    <path d="M17 3h2a2 2 0 0 1 2 2v2" />
                    <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
                    <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
                    <circle cx="12" cy="12" r="3" />
                    <path d="m16 16-1.9-1.9" />
                  </svg>
                  <span class="popover-label">ZOOM</span>
                  <span class="popover-key">Z</span>
                </span>
              </span>
            </button>
          </div>

          <div class="tool-group" aria-label="Shape tools">
            <button class="tool-button" type="button" aria-label="SQUARE" aria-pressed="false" data-tooltip="SQUARE" data-toolset-primary="shape" data-tool>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect width="18" height="18" x="3" y="3" rx="2" />
              </svg>
            </button>
            <button class="tool-button tool-menu-button" type="button" aria-label="Shape tools" aria-pressed="false" data-tooltip="Shape tools">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
              <span class="tool-popover" aria-hidden="true">
                <span class="popover-option active" data-toolset-option="shape" data-shortcut="r" data-label="SQUARE">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                  </svg>
                  <span class="popover-label">SQUARE</span>
                  <span class="popover-key">R</span>
                </span>
                <span class="popover-option" data-toolset-option="shape" data-label="CIRCLE">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                  </svg>
                  <span class="popover-label">CIRCLE</span>
                  <span class="popover-key"></span>
                </span>
                <span class="popover-option" data-toolset-option="shape" data-label="TRIANGLE">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M13.73 4a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                  </svg>
                  <span class="popover-label">TRIANGLE</span>
                  <span class="popover-key"></span>
                </span>
                <span class="popover-option" data-toolset-option="shape" data-label="STAR">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />
                  </svg>
                  <span class="popover-label">STAR</span>
                  <span class="popover-key"></span>
                </span>
              </span>
            </button>
          </div>

          <div class="tool-group" aria-label="Pen tools">
            <button class="tool-button" type="button" aria-label="PEN" aria-pressed="false" data-tooltip="PEN" data-toolset-primary="draw" data-tool>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15.707 21.293a1 1 0 0 1-1.414 0l-1.586-1.586a1 1 0 0 1 0-1.414l5.586-5.586a1 1 0 0 1 1.414 0l1.586 1.586a1 1 0 0 1 0 1.414z" />
                <path d="m18 13-1.375-6.874a1 1 0 0 0-.746-.776L3.235 2.028a1 1 0 0 0-1.207 1.207L5.35 15.879a1 1 0 0 0 .776.746L13 18" />
                <path d="m2.3 2.3 7.286 7.286" />
                <circle cx="11" cy="11" r="2" />
              </svg>
            </button>
            <button class="tool-button tool-menu-button" type="button" aria-label="Pen tools" aria-pressed="false" data-tooltip="Pen tools">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
              <span class="tool-popover" aria-hidden="true">
                <span class="popover-option active" data-toolset-option="draw" data-shortcut="p" data-label="PEN">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15.707 21.293a1 1 0 0 1-1.414 0l-1.586-1.586a1 1 0 0 1 0-1.414l5.586-5.586a1 1 0 0 1 1.414 0l1.586 1.586a1 1 0 0 1 0 1.414z" />
                    <path d="m18 13-1.375-6.874a1 1 0 0 0-.746-.776L3.235 2.028a1 1 0 0 0-1.207 1.207L5.35 15.879a1 1 0 0 0 .776.746L13 18" />
                    <path d="m2.3 2.3 7.286 7.286" />
                    <circle cx="11" cy="11" r="2" />
                  </svg>
                  <span class="popover-label">PEN</span>
                  <span class="popover-key">P</span>
                </span>
                <span class="popover-option" data-toolset-option="draw" data-shortcut="n" data-label="PENCIL">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
                    <path d="m15 5 4 4" />
                  </svg>
                  <span class="popover-label">PENCIL</span>
                  <span class="popover-key">N</span>
                </span>
              </span>
            </button>
          </div>

          <div class="tool-group" aria-label="Brush tools">
            <button class="tool-button" type="button" aria-label="BRUSH" aria-pressed="false" data-tooltip="BRUSH" data-toolset-primary="brush" data-tool>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m11 10 3 3" />
                <path d="M6.5 21A3.5 3.5 0 1 0 3 17.5a2.62 2.62 0 0 1-.708 1.792A1 1 0 0 0 3 21z" />
                <path d="M9.969 17.031 21.378 5.624a1 1 0 0 0-3.002-3.002L6.967 14.031" />
              </svg>
            </button>
            <button class="tool-button tool-menu-button" type="button" aria-label="Brush tools" aria-pressed="false" data-tooltip="Brush tools">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
              <span class="tool-popover" aria-hidden="true">
                <span class="popover-option active" data-toolset-option="brush" data-shortcut="b" data-label="BRUSH">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="m11 10 3 3" />
                    <path d="M6.5 21A3.5 3.5 0 1 0 3 17.5a2.62 2.62 0 0 1-.708 1.792A1 1 0 0 0 3 21z" />
                    <path d="M9.969 17.031 21.378 5.624a1 1 0 0 0-3.002-3.002L6.967 14.031" />
                  </svg>
                  <span class="popover-label">BRUSH</span>
                  <span class="popover-key">B</span>
                </span>
              </span>
            </button>
          </div>

          <button class="tool-button" type="button" aria-label="TYPE" aria-pressed="false" data-tooltip="TYPE" data-tool>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 4v16" />
              <path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2" />
              <path d="M9 20h6" />
            </svg>
          </button>

          <button class="tool-button" type="button" aria-label="A.I" aria-pressed="false" data-tooltip="A.I" data-tool>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z" />
              <path d="M20 2v4" />
              <path d="M22 4h-4" />
              <circle cx="4" cy="20" r="2" />
            </svg>
          </button>
        </nav>

        <nav class="bottom-toolbar history-toolbar" aria-label="History toolbar">
          <button class="tool-button" type="button" aria-label="UNDO" aria-pressed="false" data-tooltip="UNDO">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 4v7a4 4 0 0 1-4 4H4" />
              <path d="m9 10-5 5 5 5" />
            </svg>
          </button>
          <button class="tool-button" type="button" aria-label="REDO" aria-pressed="false" data-tooltip="REDO">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m15 10 5 5-5 5" />
              <path d="M4 4v7a4 4 0 0 0 4 4h12" />
            </svg>
          </button>
        </nav>
      </div>
    </main>

    <script src="./data/categories.js"></script>
    <script src="./js/icons.js"></script>
    <script src="./js/sidebar.js"></script>
    <script src="./js/drawer.js"></script>
    <script src="./js/drag-scroll.js"></script>
    <script src="./js/toolbar.js"></script>
    <script src="./js/tooltips.js"></script>
    <script src="./js/right-sidebar.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
